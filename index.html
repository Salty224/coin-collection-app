<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Collection App — OneDrive Connection Test</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
  button { display: block; width: 100%; padding: 14px; margin: 10px 0; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
  #signInBtn { background: #0078d4; color: white; }
  #readBtn { background: #107c10; color: white; }
  #writeBtn { background: #d83b01; color: white; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  pre { background: #f3f3f3; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
  .status { font-weight: bold; margin-top: 8px; }
  .ok { color: #107c10; }
  .err { color: #d83b01; }
</style>
</head>
<body>

<h2>Coin Collection App — OneDrive Connection Test</h2>
<p>This page proves out sign-in, read, and <strong>write</strong> access to your personal OneDrive via Microsoft Graph. Once write is confirmed here, this logic moves into the real app.</p>

<button id="signInBtn">1. Sign In</button>
<button id="readBtn" disabled>2. Read Drive Info</button>
<button id="writeBtn" disabled>3. Write Test File to OneDrive</button>

<div id="statusLine" class="status"></div>
<pre id="output">Not signed in yet.</pre>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script>
  const msalConfig = {
    auth: {
      clientId: "bf9aaf28-a5e1-4eed-a006-15f03146693b",
      authority: "https://login.microsoftonline.com/consumers",
      redirectUri: "https://salty224.github.io/coin-collection-app/"
    },
    cache: {
      cacheLocation: "localStorage"
    }
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);
  const scopes = ["Files.ReadWrite"];

  const output = document.getElementById("output");
  const statusLine = document.getElementById("statusLine");
  const signInBtn = document.getElementById("signInBtn");
  const readBtn = document.getElementById("readBtn");
  const writeBtn = document.getElementById("writeBtn");

  function log(obj) {
    output.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  }

  function setStatus(msg, isError) {
    statusLine.textContent = msg;
    statusLine.className = "status " + (isError ? "err" : "ok");
  }

  async function getToken() {
    const account = msalInstance.getAllAccounts()[0];
    try {
      const result = await msalInstance.acquireTokenSilent({ scopes, account });
      return result.accessToken;
    } catch (e) {
      // fall back to redirect if silent fails
      msalInstance.acquireTokenRedirect({ scopes });
    }
  }

  // Handle the redirect return (sign-in or token acquisition)
  msalInstance.handleRedirectPromise().then((response) => {
    const account = msalInstance.getAllAccounts()[0];
    if (account) {
      setStatus("Signed in as " + account.username, false);
      readBtn.disabled = false;
      writeBtn.disabled = false;
      signInBtn.textContent = "Signed In ✓";
      signInBtn.disabled = true;
    }
  }).catch((err) => {
    setStatus("Redirect error: " + err.message, true);
  });

  signInBtn.addEventListener("click", () => {
    msalInstance.loginRedirect({ scopes });
  });

  readBtn.addEventListener("click", async () => {
    setStatus("Reading drive info...", false);
    const token = await getToken();
    if (!token) return;
    try {
      const res = await fetch("https://graph.microsoft.com/v1.0/me/drive", {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data));
      log(data);
      setStatus("Read succeeded.", false);
    } catch (e) {
      log(e.message);
      setStatus("Read failed.", true);
    }
  });

  writeBtn.addEventListener("click", async () => {
    setStatus("Writing test file to OneDrive...", false);
    const token = await getToken();
    if (!token) return;
    try {
      const fileName = "CoinApp-WriteTest-" + Date.now() + ".txt";
      const content = "Coin Collection App write test.\nCreated: " + new Date().toString();

      // PUT to /me/drive/root:/{filename}:/content creates the file at the OneDrive root
      const res = await fetch(
        "https://graph.microsoft.com/v1.0/me/drive/root:/" + encodeURIComponent(fileName) + ":/content",
        {
          method: "PUT",
          headers: {
            Authorization: "Bearer " + token,
            "Content-Type": "text/plain"
          },
          body: content
        }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data));
      log(data);
      setStatus("Write succeeded — check your OneDrive root for " + fileName, false);
    } catch (e) {
      log(e.message);
      setStatus("Write failed.", true);
    }
  });
</script>

</body>
</html>
