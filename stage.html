<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Coin — Coin Collection App</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 520px; margin: 0 auto; padding: 16px; line-height: 1.5; color: #222; }
  h2 { margin-top: 0; }
  label { display: block; font-weight: 600; margin-top: 14px; margin-bottom: 4px; font-size: 14px; }
  input[type=text], input[type=number], input[type=date], textarea, select {
    width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
  }
  textarea { resize: vertical; min-height: 60px; }
  .photo-row { display: flex; gap: 10px; margin-top: 8px; }
  .photo-box { flex: 1; text-align: center; border: 1px solid #eee; border-radius: 8px; padding: 8px; }
  .photo-box .name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .photo-box img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; display: none; background: #f3f3f3; margin-bottom: 6px; }
  .photo-btns { display: flex; gap: 6px; }
  .photo-btns button {
    flex: 1; font-size: 12px; padding: 8px 4px; border: 1px solid #0078d4; border-radius: 6px;
    background: white; color: #0078d4; cursor: pointer;
  }
  .photo-btns button.has-photo { border-color: #107c10; color: #107c10; }
  .photo-box input[type=file] { display: none; }
  button#saveBtn {
    width: 100%; padding: 16px; margin-top: 24px; font-size: 17px; font-weight: 600;
    background: #0078d4; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button#saveBtn:disabled { background: #ccc; }
  #statusLine { margin-top: 14px; font-weight: 600; text-align: center; }
  .ok { color: #107c10; }
  .err { color: #d83b01; }
  .signedout { text-align: center; padding: 40px 0; }
  #signInBtn { background: #0078d4; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .section-label { margin-top: 20px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: #888; border-top: 1px solid #eee; padding-top: 14px; }
  .additional-item { border: 1px solid #eee; border-radius: 8px; padding: 8px; margin-top: 10px; }
  .additional-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; background: #f3f3f3; display: none; margin-bottom: 6px; }
  .additional-item input[type=text] { margin: 6px 0 0 0; }
  .additional-item .removeBtn { background: none; color: #d83b01; border: none; padding: 6px 0; cursor: pointer; font-size: 12px; text-align: right; width: 100%; }
  #addImageBtn {
    width: 100%; margin-top: 10px; padding: 10px; border: 2px dashed #aaa; border-radius: 8px;
    background: none; color: #666; font-size: 14px; cursor: pointer;
  }
</style>
</head>
<body>

<div id="signedOutView" class="signedout">
  <h2>Add New Coin</h2>
  <p>Sign in to your OneDrive to continue.</p>
  <button id="signInBtn">Sign In</button>
</div>

<div id="formView" style="display:none;">
  <h2>Add New Coin</h2>

  <div class="photo-row">
    <div class="photo-box" id="obverseBox">
      <div class="name">Obverse (front)</div>
      <img id="obversePreview">
      <div class="photo-btns">
        <button type="button" id="obverseCameraBtn">📷 Camera</button>
        <button type="button" id="obverseLibraryBtn">🖼️ Library</button>
      </div>
      <input type="file" id="obverseCameraInput" accept="image/*" capture="environment">
      <input type="file" id="obverseLibraryInput" accept="image/*">
    </div>
    <div class="photo-box" id="reverseBox">
      <div class="name">Reverse (back)</div>
      <img id="reversePreview">
      <div class="photo-btns">
        <button type="button" id="reverseCameraBtn">📷 Camera</button>
        <button type="button" id="reverseLibraryBtn">🖼️ Library</button>
      </div>
      <input type="file" id="reverseCameraInput" accept="image/*" capture="environment">
      <input type="file" id="reverseLibraryInput" accept="image/*">
    </div>
  </div>

  <div class="section-label">Additional Images (optional)</div>
  <p style="font-size:12px; color:#888; margin-top:0;">Seller/auction photos, combined obverse+reverse shots, or anything else worth keeping.</p>
  <div id="additionalList"></div>
  <button id="addImageBtn" type="button">+ Add Another Image</button>

  <label>Denomination</label>
  <input type="text" id="denomination" placeholder="e.g. Lincoln Cent, Morgan Dollar">

  <label>Year</label>
  <input type="text" id="year" placeholder="e.g. 1943">

  <label>Mint Mark</label>
  <input type="text" id="mintMark" placeholder="e.g. D, S, or blank for Philadelphia">

  <label>Variety / Type</label>
  <input type="text" id="variety" placeholder="e.g. Wheat, Doubled Die">

  <label>Grade (if graded)</label>
  <input type="text" id="grade" placeholder="e.g. MS65, or leave blank">

  <div class="section-label">Purchase Info</div>

  <label>Purchase Price</label>
  <input type="number" step="0.01" id="purchasePrice" placeholder="e.g. 45.00">

  <label>Purchase Date</label>
  <input type="date" id="purchaseDate">

  <label>Vendor / Source</label>
  <input type="text" id="vendor" placeholder="e.g. eBay seller, local shop name">

  <div class="photo-box" id="receiptBox" style="margin-top:10px;">
    <div class="name">🧾 Receipt Photo (optional)</div>
    <img id="receiptPreview">
    <div class="photo-btns">
      <button type="button" id="receiptCameraBtn">📷 Camera</button>
      <button type="button" id="receiptLibraryBtn">🖼️ Library</button>
    </div>
    <input type="file" id="receiptCameraInput" accept="image/*" capture="environment">
    <input type="file" id="receiptLibraryInput" accept="image/*">
  </div>

  <div class="section-label">Other</div>

  <label>Storage Location</label>
  <input type="text" id="storageLocation" placeholder="e.g. Safe, Box 2, Album A">

  <label>Notes</label>
  <textarea id="notes" placeholder="Anything else worth remembering"></textarea>

  <button id="saveBtn">Save to Staging</button>
  <div id="statusLine"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script>
  const msalConfig = {
    auth: {
      clientId: "bf9aaf28-a5e1-4eed-a006-15f03146693b",
      authority: "https://login.microsoftonline.com/consumers",
      redirectUri: "https://salty224.github.io/coin-collection-app/stage.html"
    },
    cache: { cacheLocation: "localStorage" }
  };
  const msalInstance = new msal.PublicClientApplication(msalConfig);
  const scopes = ["Files.ReadWrite"];

  const signedOutView = document.getElementById("signedOutView");
  const formView = document.getElementById("formView");
  const statusLine = document.getElementById("statusLine");
  const saveBtn = document.getElementById("saveBtn");

  function setStatus(msg, isError) {
    statusLine.textContent = msg;
    statusLine.className = isError ? "err" : "ok";
  }

  async function getToken() {
    const account = msalInstance.getAllAccounts()[0];
    try {
      const result = await msalInstance.acquireTokenSilent({ scopes, account });
      return result.accessToken;
    } catch (e) {
      msalInstance.acquireTokenRedirect({ scopes });
    }
  }

  msalInstance.handleRedirectPromise().then(() => {
    const account = msalInstance.getAllAccounts()[0];
    if (account) {
      signedOutView.style.display = "none";
      formView.style.display = "block";
    }
  });

  document.getElementById("signInBtn").addEventListener("click", () => {
    msalInstance.loginRedirect({ scopes });
  });

  // Each photo slot has two real file inputs (camera-forced and library-only) and
  // two visible buttons that trigger them. Whichever one the user picks a file from
  // updates the same preview image, and we track which file is "active" for that slot.
  const activeFiles = {}; // slotName -> File

  function wirePhotoSlot(slotName, previewId, cameraBtnId, libraryBtnId, cameraInputId, libraryInputId) {
    const preview = document.getElementById(previewId);
    const cameraBtn = document.getElementById(cameraBtnId);
    const libraryBtn = document.getElementById(libraryBtnId);
    const cameraInput = document.getElementById(cameraInputId);
    const libraryInput = document.getElementById(libraryInputId);

    cameraBtn.addEventListener("click", () => cameraInput.click());
    libraryBtn.addEventListener("click", () => libraryInput.click());

    function handleFile(file) {
      activeFiles[slotName] = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      cameraBtn.classList.add("has-photo");
      libraryBtn.classList.add("has-photo");
      cameraBtn.textContent = "📷 Retake";
      libraryBtn.textContent = "🖼️ Reselect";
    }

    cameraInput.addEventListener("change", () => {
      if (cameraInput.files && cameraInput.files[0]) handleFile(cameraInput.files[0]);
    });
    libraryInput.addEventListener("change", () => {
      if (libraryInput.files && libraryInput.files[0]) handleFile(libraryInput.files[0]);
    });
  }

  wirePhotoSlot("obverse", "obversePreview", "obverseCameraBtn", "obverseLibraryBtn", "obverseCameraInput", "obverseLibraryInput");
  wirePhotoSlot("reverse", "reversePreview", "reverseCameraBtn", "reverseLibraryBtn", "reverseCameraInput", "reverseLibraryInput");
  wirePhotoSlot("receipt", "receiptPreview", "receiptCameraBtn", "receiptLibraryBtn", "receiptCameraInput", "receiptLibraryInput");

  // Additional images: dynamic list, each with camera/library buttons + optional label.
  const additionalList = document.getElementById("additionalList");
  let additionalCount = 0;
  const additionalItems = []; // { id, getFile: () => File, labelInput }

  document.getElementById("addImageBtn").addEventListener("click", () => {
    additionalCount++;
    const id = "additional_" + additionalCount;
    const row = document.createElement("div");
    row.className = "additional-item";
    row.innerHTML = `
      <img id="${id}_preview">
      <div class="photo-btns">
        <button type="button" id="${id}_cameraBtn">📷 Camera</button>
        <button type="button" id="${id}_libraryBtn">🖼️ Library</button>
      </div>
      <input type="file" accept="image/*" capture="environment" id="${id}_cameraInput" style="display:none;">
      <input type="file" accept="image/*" id="${id}_libraryInput" style="display:none;">
      <input type="text" id="${id}_label" placeholder="Label (e.g. eBay listing photo)">
      <button type="button" class="removeBtn">Remove</button>
    `;
    additionalList.appendChild(row);

    let activeFile = null;
    const preview = row.querySelector(`#${id}_preview`);
    const cameraBtn = row.querySelector(`#${id}_cameraBtn`);
    const libraryBtn = row.querySelector(`#${id}_libraryBtn`);
    const cameraInput = row.querySelector(`#${id}_cameraInput`);
    const libraryInput = row.querySelector(`#${id}_libraryInput`);

    cameraBtn.addEventListener("click", () => cameraInput.click());
    libraryBtn.addEventListener("click", () => libraryInput.click());

    function handleFile(file) {
      activeFile = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      cameraBtn.classList.add("has-photo");
      libraryBtn.classList.add("has-photo");
    }
    cameraInput.addEventListener("change", () => {
      if (cameraInput.files && cameraInput.files[0]) handleFile(cameraInput.files[0]);
    });
    libraryInput.addEventListener("change", () => {
      if (libraryInput.files && libraryInput.files[0]) handleFile(libraryInput.files[0]);
    });

    row.querySelector(".removeBtn").addEventListener("click", () => {
      row.remove();
      const idx = additionalItems.findIndex(item => item.id === id);
      if (idx > -1) additionalItems.splice(idx, 1);
    });

    additionalItems.push({ id, getFile: () => activeFile, labelInput: row.querySelector(`#${id}_label`) });
  });

  function pad(n) { return String(n).padStart(2, "0"); }

  async function uploadFile(token, path, file) {
    const res = await fetch(
      "https://graph.microsoft.com/v1.0/me/drive/root:/" + path.split("/").map(encodeURIComponent).join("/") + ":/content",
      {
        method: "PUT",
        headers: { Authorization: "Bearer " + token, "Content-Type": file.type || "application/octet-stream" },
        body: file
      }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    return data;
  }

  async function uploadJson(token, path, obj) {
    const res = await fetch(
      "https://graph.microsoft.com/v1.0/me/drive/root:/" + path.split("/").map(encodeURIComponent).join("/") + ":/content",
      {
        method: "PUT",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify(obj, null, 2)
      }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    return data;
  }

  saveBtn.addEventListener("click", async () => {
    const obverseFile = activeFiles["obverse"];
    const reverseFile = activeFiles["reverse"];
    const receiptFile = activeFiles["receipt"];

    if (!obverseFile || !reverseFile) {
      setStatus("Obverse and reverse photos are both required.", true);
      return;
    }

    saveBtn.disabled = true;
    setStatus("Saving...", false);

    try {
      const token = await getToken();
      if (!token) throw new Error("Not signed in.");

      const now = new Date();
      const stampDate = now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate());
      const seq = pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
      const stagingId = stampDate + "-" + seq;
      const folder = "CoinCollection/Staging/" + stagingId;

      setStatus("Uploading obverse photo...", false);
      await uploadFile(token, folder + "/obverse.jpg", obverseFile);

      setStatus("Uploading reverse photo...", false);
      await uploadFile(token, folder + "/reverse.jpg", reverseFile);

      let receiptFileName = "";
      if (receiptFile) {
        receiptFileName = stagingId + "_receipt.jpg";
        setStatus("Uploading receipt photo...", false);
        await uploadFile(token, "CoinCollection/CoinReceipts/" + receiptFileName, receiptFile);
      }

      const additionalImages = [];
      for (let i = 0; i < additionalItems.length; i++) {
        const item = additionalItems[i];
        const file = item.getFile();
        if (!file) continue;
        const fileName = "additional_" + (i + 1) + ".jpg";
        setStatus("Uploading additional image " + (i + 1) + "...", false);
        await uploadFile(token, folder + "/" + fileName, file);
        additionalImages.push({ file: fileName, label: item.labelInput.value || "" });
      }

      const record = {
        stagedDate: now.toISOString(),
        collectionID: "",
        denomination: document.getElementById("denomination").value,
        year: document.getElementById("year").value,
        mintMark: document.getElementById("mintMark").value,
        variety: document.getElementById("variety").value,
        grade: document.getElementById("grade").value,
        purchasePrice: document.getElementById("purchasePrice").value,
        purchaseDate: document.getElementById("purchaseDate").value,
        vendor: document.getElementById("vendor").value,
        storageLocation: document.getElementById("storageLocation").value,
        notes: document.getElementById("notes").value,
        photos: { obverse: "obverse.jpg", reverse: "reverse.jpg" },
        additionalImages: additionalImages,
        receiptPhoto: receiptFileName,
        status: "pending_review"
      };

      setStatus("Saving record...", false);
      await uploadJson(token, folder + "/data.json", record);

      setStatus("✅ Saved to Staging/" + stagingId, false);
      saveBtn.textContent = "Saved ✓";
      setTimeout(() => { window.location.reload(); }, 2000);

    } catch (e) {
      setStatus("Error: " + e.message, true);
      saveBtn.disabled = false;
    }
  });
</script>

</body>
</html>
